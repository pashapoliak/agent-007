services:
  - type: web
    name: suno-music-archiver
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      # For persistent JSON storage (recommended):
      # 1. Upgrade plan to at least Starter
      # 2. Attach a disk named "music-data" mounted at /data
      # 3. Then set this env var:
      # - key: DATA_DIR
      #   value: /data
    healthCheckPath: /health
